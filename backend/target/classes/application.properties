# ============================================================
# Smart Expense Splitter (Splitwise++) - Application Config
# ============================================================

spring.application.name=splitwise-plus

# ── Server ──────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# Database (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/splitwise_plus}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ── JWT ─────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:your-very-long-and-secure-secret-key-at-least-256-bits-for-hs512-algorithm}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ── File Upload ─────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=${UPLOAD_DIR:./uploads}

# ── Email (SMTP) ─────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:noreply@splitwiseplus.com}

# ── Firebase ────────────────────────────────────────────────
app.firebase.credentials-path=${FIREBASE_CREDENTIALS:./firebase-service-account.json}
app.firebase.enabled=${FIREBASE_ENABLED:false}

# ── Currency API ────────────────────────────────────────────
app.currency.api-url=https://api.exchangerate-api.com/v4/latest
app.currency.base=USD
app.currency.cache-ttl-minutes=60

# ── OCR (Tesseract) ─────────────────────────────────────────
app.ocr.tessdata-path=${TESSDATA_PATH:/usr/share/tesseract-ocr/4.00/tessdata}

# ── Caching ──────────────────────────────────────────────────
spring.cache.type=simple

# ── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ── Logging ──────────────────────────────────────────────────
logging.level.com.splitwiseplusplus=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

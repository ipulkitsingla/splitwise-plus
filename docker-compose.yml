version: '3.9'

services:
  # ── MySQL Database ───────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: splitwise_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: splitwise_plus
      MYSQL_USER: ${DB_USERNAME:-splitwise}
      MYSQL_PASSWORD: ${DB_PASSWORD:-splitwisepass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: splitwise_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/splitwise_plus?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME:-splitwise}
      DB_PASSWORD: ${DB_PASSWORD:-splitwisepass}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-very-long-secret-at-least-64-chars-for-production}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FIREBASE_ENABLED: ${FIREBASE_ENABLED:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: splitwise_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
      VITE_WS_URL: ws://localhost:8080/api/v1/ws
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
  uploads_data:
